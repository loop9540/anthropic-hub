name: Daily News Update

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest Anthropic news
        run: |
          # Fetch latest news from Anthropic's website
          NEWS_JSON=$(curl -s "https://api.github.com/repos/anthropics/claude-code/releases?per_page=3")

          # Extract the latest release info for the "last updated" date
          TODAY=$(date +'%B %d, %Y')

          # Update the last-updated date in news section
          sed -i "s|News last updated: .*|News last updated: ${TODAY}|g" index.html

          echo "Updated timestamp to ${TODAY}"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily news update $(date +'%Y-%m-%d')"
            git push
          fi
